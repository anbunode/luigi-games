# SkrepayShop — Netlify (cuenta principal)
# Sustituye TU-SERVICIO.onrender.com por tu API Render con DATABASE_URL configurada

[build]
  base = "skrepayshop-platform"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_PLATFORM_NAME = "SkrepayShop"
  NEXT_PUBLIC_PLATFORM_URL = "https://skrepay.com"
  NEXT_PUBLIC_PANEL_URL = "https://app.skrepay.com"
  NEXT_PUBLIC_TENANT_STORE_BASE = "skrepay.shop"
  NEXT_PUBLIC_PAYMENT_LINK_BASE = "pay.skrepay.com"
  NEXT_PUBLIC_DEMO_STORE_URL = "https://demo.skrepay.shop"

# MEDUSA_BACKEND_URL y NEXT_PUBLIC_ADMIN_ORIGIN → configurar en Netlify UI
# (no commitear URLs Render concretas; cada entorno las define)
