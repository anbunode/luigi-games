# SkrepayShop — skrepay.com (cuenta Netlify oficial)
# API: https://api.skrepay.com (Render: servicio skrepayshop-api)

[build]
  base = "skrepayshop-platform"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_PLATFORM_NAME = "SkrepayShop"
  NEXT_PUBLIC_PLATFORM_URL = "https://skrepay.com"
  NEXT_PUBLIC_PANEL_URL = "https://app.skrepay.com"
  NEXT_PUBLIC_TENANT_STORE_BASE = "skrepay.shop"
  NEXT_PUBLIC_PAYMENT_LINK_BASE = "pay.skrepay.com"
  NEXT_PUBLIC_DEMO_STORE_URL = "https://demo.skrepay.shop"
  # API SkrepayShop (Render). Si api.skrepay.com aún no resuelve, usa temporalmente:
  # https://skrepayshop-api.onrender.com
  MEDUSA_BACKEND_URL = "https://api.skrepay.com"
  NEXT_PUBLIC_ADMIN_ORIGIN = "https://api.skrepay.com"
  NEXT_PUBLIC_MEDUSA_BACKEND_URL = "https://api.skrepay.com"
