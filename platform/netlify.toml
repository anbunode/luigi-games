[build]
  base = "platform"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_PLATFORM_NAME = "Luigi Commerce"
  NEXT_PUBLIC_ADMIN_URL = "https://luigi-games-api1.onrender.com/app"
  MEDUSA_BACKEND_URL = "https://luigi-games-api1.onrender.com"
