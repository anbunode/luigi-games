services:
  - type: web
    name: luigi-games-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: AUTH_MFA_ENCRYPTION_KEY
        generateValue: true
      - key: STORE_CORS
        value: https://luigigame.com,https://www.luigigame.com,https://strong-cascaron-2e0511.netlify.app
      - key: ADMIN_CORS
        value: https://api.luigigame.com,https://luigi-games-api1.onrender.com
      - key: AUTH_CORS
        value: https://luigigame.com,https://www.luigigame.com,https://api.luigigame.com,https://strong-cascaron-2e0511.netlify.app
      - key: STOREFRONT_URL
        value: https://strong-cascaron-2e0511.netlify.app
      - key: MEDUSA_BACKEND_URL
        value: https://luigi-games-api1.onrender.com
