services:
  - type: web
    name: skrepayshop-api
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    rootDir: skrepayshop-api
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: PLATFORM_DATABASE_URL
        sync: false
      - key: TENANT_AUTO_PROVISION
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: AUTH_MFA_ENCRYPTION_KEY
        generateValue: true
      - key: MEDUSA_BACKEND_URL
        value: https://skrepayshop-api.onrender.com
      - key: PLATFORM_URL
        value: https://skrepay.com
      - key: STORE_CORS
        value: https://skrepay.com,https://www.skrepay.com,https://app.skrepay.com
      - key: ADMIN_CORS
        value: https://skrepay.com,https://www.skrepay.com,https://app.skrepay.com,https://skrepayshop-api.onrender.com
      - key: AUTH_CORS
        value: https://skrepay.com,https://www.skrepay.com,https://app.skrepay.com,https://skrepayshop-api.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: SKREPAY_EMAIL_FROM
        value: SkrepayShop <noreply@skrepay.com>
      - key: STOREFRONT_URL
        value: https://skrepay.com
